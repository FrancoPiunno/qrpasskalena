<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entrada - QR Pass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=11">
    <link rel="shortcut icon" type="x-icon" href="{{ url_for('static', filename='webicon.png') }}">
</head>
<body style="background: #161616; min-height: 100vh;">
    
    <div class="main-layout" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1.5rem;">
        
        <!-- Tarjeta de Registro Principal -->
        <div class="premium-form-card" style="border: 1px solid rgba(255,255,255,0.05); background: rgba(18, 18, 18, 0.8);">
            <div style="width: 100%; display: flex; flex-direction: column; align-items: center; text-align: center;" class="mb-4">
                <h2 style="font-size: 2rem; font-weight: 500; margin-bottom: 0.5rem; color: #fff; letter-spacing: -1px; width: 100%;">Nueva Entrada</h2>
                <p style="color: rgba(255,255,255,0.4); font-size: 0.95rem; text-align: center; width: 100%; margin: 0;">Genera un pase instantáneo</p>
            </div>

            <form method="POST">
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <select name="evento" class="premium-input" required>
                        {% if eventos|length > 1 %}
                            <option value="">Seleccione un evento</option>
                        {% endif %}
                        {% for ev in eventos %}
                        <option value="{{ ev.nombre }}" {{ 'selected' if eventos|length == 1 }}>{{ ev.nombre }}</option>
                        {% endfor %}
                    </select>

                    <input type="text" name="nombre" class="premium-input" required placeholder="Nombre Completo">
                    <input type="text" name="telefono" class="premium-input" required placeholder="Teléfono de contacto">

                    <button type="submit" class="btn-valida" style="height: 55px; font-weight: 600; font-size: 1.1rem; margin-top: 1rem; border-radius: 12px;">
                        Generar Entrada
                    </button>

                    <a href="{{ url_for('tickets.lista_entradas') }}" style="text-align: center; color: rgba(255,255,255,0.3); text-decoration: none; font-size: 0.85rem; margin-top: 0.5rem;">
                        Volver a lista
                    </a>
                </div>
            </form>
        </div>

    </div>

    <!-- Modal de Éxito (Dialog) -->
    <div id="successModal" class="search-bubble-modal {{ 'active' if qr_base64 else '' }}">
        <div class="premium-form-card" style="max-width: 400px; text-align: center; border-color: rgba(168, 224, 99, 0.2); box-shadow: 0 0 50px rgba(168, 224, 99, 0.1);">
            <div style="margin-bottom: 1.5rem; width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div style="width: 60px; height: 60px; background: rgba(168, 224, 99, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#a8e063" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <h2 style="color: #fff; font-size: 1.5rem; font-weight: 600; margin: 0; width: 100%; text-align: center;">Entrada Generada</h2>
                <p style="color: #a8e063; font-size: 0.9rem; margin-top: 0.2rem; font-weight: 500; width: 100%; text-align: center;">Exitosamente</p>
            </div>

            <div style="background: rgba(255,255,255,0.03); padding: 1.8rem 2rem; border-radius: 24px; margin-bottom: 2rem; text-align: left; border: 1px solid rgba(255,255,255,0.05);">
                <p style="color: rgba(255,255,255,0.4); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 0.4rem;">Invitado</p>
                <p style="color: #fff; font-size: 1.25rem; font-weight: 500; margin-bottom: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 0.5rem;">{{ nombre }}</p>

                <p style="color: rgba(255,255,255,0.4); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 0.4rem;">Teléfono</p>
                <p style="color: #fff; font-size: 1.1rem; font-weight: 400; margin-bottom: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 0.5rem;">{{ telefono }}</p>
                
                <p style="color: rgba(255,255,255,0.4); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 0.4rem;">Evento</p>
                <p style="color: #fff; font-size: 1.1rem; font-weight: 400; margin: 0;">{{ evento }}</p>
            </div>

            <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                <button onclick="sharePngWithText(event)" class="btn-valida" style="height: 55px; border-radius: 12px; font-weight: 600; cursor: pointer;">
                    Compartir WhatsApp
                </button>
                <a href="{{ url_for('tickets.descargar_qr', id=qr_id) }}" class="btn-white" style="text-decoration: none; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px;">
                    Descargar Ticket
                </a>
                <button onclick="closeSuccessModal()" style="background: transparent; color: rgba(255,255,255,0.3); border: none; font-size: 0.9rem; margin-top: 0.5rem; cursor: pointer;">
                    Cerrar
                </button>
            </div>
        </div>
    </div>

    <script>
        function closeSuccessModal() {
            document.getElementById('successModal').classList.remove('active');
        }

        async function sharePngWithText(e) {
            e.preventDefault();
            const text = `🎟️ *Entrada Confirmada*\n\n👤 *Nombre:* {{ nombre|e }}\n📌 *Evento:* {{ evento|e }}\n📞 *Tel:* {{ telefono|e }}\n\n✅ _Presenta este mensaje en el ingreso._`;
            
            let blob;
            try {
                const res = await fetch(`data:image/png;base64,{{ qr_base64 }}`);
                blob = await res.blob();
            } catch (err) { return; }

            try {
                const file = new File([blob], `Entrada_{{ nombre|e }}.png`, { type: "image/png" });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ title: "QR Pass", text, files: [file] });
                    return;
                }
            } catch (err) {}
            window.open(`https://web.whatsapp.com/send?text=${encodeURIComponent(text)}`, "_blank");
        }
    </script>
</body>
</html>
